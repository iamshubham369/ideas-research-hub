<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antler NEXT100 — Insight Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --surface: #121214;
            --surface-hover: #1a1a1c;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --text-dim: #71717a;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Outfit', sans-serif;
            --shadow: 0 4px 20px -1px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            line-height: 1.5;
            padding: 2rem 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3f3f46;
        }

        .header {
            margin-bottom: 2.5rem;
        }

        .header h2 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(to bottom right, #fff 40%, #71717a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: 1rem;
            color: var(--text-muted);
            max-width: 600px;
        }

        .summary-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .stat:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .stat-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .stat-val {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }

        .stat::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at top right, var(--accent-glow), transparent 70%);
            pointer-events: none;
        }

        .tab-bar {
            display: flex;
            gap: 0.5rem;
            padding: 4px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            width: fit-content;
            margin-bottom: 2.5rem;
            border: 1px solid var(--border);
        }

        .tab {
            padding: 0.6rem 1.25rem;
            font-size: 14px;
            font-weight: 500;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: transparent;
            color: var(--text-muted);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab.active {
            background: #fff;
            color: #000;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.2);
        }

        .tab:hover:not(.active) {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card:hover {
            border-color: var(--border-hover);
            transform: translateY(-4px);
            box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.6);
            background: var(--surface-hover);
        }

        .card.expanded {
            border-color: var(--accent);
            background: var(--surface-hover);
            box-shadow: 0 0 0 1px var(--accent), 0 12px 30px -10px rgba(99, 102, 241, 0.3);
        }

        .card-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .card-num {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .card-title {
            font-family: var(--font-display);
            font-size: 1.15rem;
            font-weight: 600;
            color: #fff;
            flex: 1;
            line-height: 1.3;
        }

        .chevron {
            font-size: 14px;
            color: var(--text-dim);
            transition: transform 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .expanded .chevron {
            transform: rotate(180deg);
            color: var(--accent);
        }

        .signal-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .signal-bar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .signal-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .bars {
            display: flex;
            gap: 3px;
        }

        .bar {
            height: 4px;
            width: 12px;
            border-radius: 2px;
        }

        .sector-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .detail {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .detail.open {
            max-height: 600px;
        }

        .detail-inner {
            padding-top: 1.5rem;
            margin-top: 0.5rem;
        }

        .detail-section {
            margin-bottom: 1.25rem;
        }

        .detail-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.4rem;
            display: block;
        }

        .detail-text {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 1rem;
        }

        .tag {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .ask-btn {
            margin-top: 1.5rem;
            width: 100%;
            font-size: 13px;
            font-weight: 600;
            padding: 0.8rem;
            border-radius: var(--radius-md);
            background: #fff;
            color: #000;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .ask-btn:hover {
            background: #e4e4e7;
            transform: translateY(-1px);
        }

        @media (max-width: 640px) {
            body {
                padding: 1.5rem 1rem;
            }

            .header h2 {
                font-size: 1.8rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .tab-bar {
                overflow-x: auto;
                max-width: 100%;
                padding: 4px 1rem;
            }
        }
    </style>
</head>
